version: 1
decisions:
  - id: D028
    date: "2026-06-25"
    title: "Wire Source evidence frontend pages to approved read-only APIs"
    rationale: "IM028 follows the merged IM027 read-only backend contract by connecting existing Source, Raw Material, and Parsed Document pages to GET endpoints only. It keeps create source, upload, sync execution, parser execution, external connectors, backend changes, database changes, dependency changes, and write APIs out of scope."
    related:
      - IM028
      - D027
      - SOURCE_RAW_MATERIAL_PARSED_DOCUMENT_READONLY_BACKEND
  - id: D027
    date: "2026-06-25"
    title: "Implement approved read-only Source evidence backend contract"
    rationale: "The user explicitly approved crossing Java, database, migration, and API stop-condition boundaries after IM026 defined the model contract. IM027 implements only read-only Source / Raw Material / Parsed Document persistence and GET APIs, keeping import, upload, parser execution, sync execution, permissions, frontend service wiring, dependencies, and write APIs out of scope."
    related:
      - IM027
      - D026
      - SOURCE_RAW_MATERIAL_PARSED_DOCUMENT_MODEL_CONTRACT
  - id: D026
    date: "2026-06-25"
    title: "Define Source / Raw Material / Parsed Document read-only model contract before backend implementation"
    rationale: "IM026 turns the IM024 Phase 2 plan into a concrete model and read-only API contract proposal while keeping Java, DB, API, migration, parser, upload, external connector, and frontend service wiring out of scope. Any IM027 implementation must be explicitly approved because it will touch persistence and API boundaries."
    related:
      - IM026
      - SOURCE_RAW_MATERIAL_PARSED_DOCUMENT_MODEL_CONTRACT
      - SOURCE_RAW_MATERIAL_PARSED_DOCUMENT
  - id: D024
    date: "2026-06-25"
    title: "Start Phase 2 with Source / Raw Material / Parsed Document planning before implementation"
    rationale: "The v0.2 release baseline identifies Source / Raw Material / Parsed Document as the first Phase 2 backlog item, but real import, parser, backend, database, API, and external integration work are stop-condition areas. IM024 therefore creates a docs-only execution plan that separates read-only UX deepening, model/API contract planning, and later implementation approvals."
    related:
      - MVP_V0_2
      - IM024
      - SOURCE_RAW_MATERIAL_PARSED_DOCUMENT
  - id: D023
    date: "2026-06-24"
    title: "Close MVP v0.2 release baseline after IM014 through IM022"
    rationale: "IM014 through IM022 merged frontend localization, WikiGraph canvas and layout, Sources and Raw Materials boundary copy, Retrieval Test debug UX, Knowledge Object metadata, and Index Segment preview/debug. IM023 packages the release baseline and acceptance checklist without product code, backend, DB, API, Java model, or dependency changes."
    related:
      - MVP_V0_2
      - IM017
      - IM018
      - IM019
      - IM020
      - IM021
      - IM022
      - IM023
  - id: D014
    date: "2026-06-24"
    title: "Run IM014 as a frontend-only localization and UX feedback baseline"
    rationale: "The user requested IM014 from latest main after IM010 through IM013. The task uses the existing frontend-ux-polish gate to make current MVP pages manually acceptable without changing backend, database, dependencies, or the Knowledge Object model."
    related:
      - US014
      - IM014
      - FRONTEND_UX_GUIDELINES
  - id: D004
    date: "2026-06-23"
    title: "Register WeKnora analysis and frontend shell skeleton as independent ready tasks"
    rationale: "The user provided two development tasks in /Users/mac/Desktop/开发任务.md and explicitly recommended separate branches/sessions. The current queue now tracks source analysis and frontend skeleton work separately so analysis stays read-only and frontend work stays mock-only/frontend-only."
    related:
      - US004
      - IM004
      - US005
      - IM005
  - id: D003
    date: "2026-06-23"
    title: "Persist WikiNode Studio full product plan in current project docs"
    rationale: "The user provided a full WikiNode Studio v0.2 product map and requested the project to remember it through repository documents instead of chat context. Current docs now distinguish durable product direction from executable task scope so future work stays WikiNode-centered without authorizing broad feature expansion."
    related:
      - PRODUCT_SCOPE
      - FEATURE_MAP_V0_2
      - DESIGN_REFERENCE
  - id: D002
    date: "2026-06-23"
    title: "Run Frontend UX Polish v0.1 before expanding product features"
    rationale: "MVP v0.1 is technically usable, but user-facing English copy, scattered status labels, uneven operation feedback, and form interaction gaps make manual acceptance unreliable. The polish gate keeps the work frontend-only and preserves backend/API/schema boundaries."
    related:
      - US002
      - IM002
      - MVP_V0_1
  - id: D001
    date: "2026-06-22"
    title: "Plan PostgreSQL integration CI plus Playwright smoke CI as the next hardening task"
    rationale: "MVP v0.1 already has local persistence, reset, API smoke, browser smoke, baseline CI, and Harness governance; the next risk is reproducing the persisted browser path in CI."
    related:
      - US001
      - IM001
      - MVP_V0_1
