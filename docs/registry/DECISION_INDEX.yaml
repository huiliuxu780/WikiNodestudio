  - id: D081
    date: "2026-07-01"
    title: "Show Source credential readiness without real secret handling"
    rationale: "After IM080 made Source connector configuration visible, IM081 adds the next operator layer: credential readiness and connection-check evidence. The UI may show masked credential profile labels, credential status, credential scope, last check time, and failure reason, but it must not add real OAuth, real secret storage, token/password/private-key input, external API/database/web crawler execution, real connection testing, external scheduling, embedding, vector sync, approval workflow, RBAC, batch/export, Agent, Chatbot, Workflow Builder, Vector DB Management, product-facing Chunk Management, package changes, or lockfile changes."
    related:
      - IM081
      - US081
      - SOURCE_CONNECTOR_CREDENTIAL_UX
      - EXTERNAL_SOURCE_CONNECTOR_CONFIGURATION_BASELINE
  - id: D080
    date: "2026-06-30"
    title: "Design Source connector configuration as a local evidence console before real integration"
    rationale: "After IM079 proved the local imported-document-to-WikiNode-to-Graph-to-Retrieval acceptance loop, the next packet should make Source management credible for operators. IM080 defines a local connector-configuration baseline around Source ownership, ingestion mode, connection status, sync status, Source Operation records, and the Source-to-WikiNode evidence chain. It deliberately avoids real Feishu/API/database/web crawler execution, OAuth, external scheduling, embedding, external vector sync, approval workflow, RBAC, batch operations, export, Agent, Chatbot, Workflow Builder, Vector DB Management, product-facing Chunk Management, package changes, and lockfile changes."
    related:
