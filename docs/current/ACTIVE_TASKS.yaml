      - "src/main/resources/db/migration/**"
      - "src/pages/**"
      - "src/services/**"
      - "src/types/**"
      - "src/data/**"
      - "src/utils/**"
      - "src/test/java/**"
      - "tests/e2e/**"
      - "scripts/api-smoke.sh"
      - "docs/current/**"
