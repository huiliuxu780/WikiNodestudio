    acceptance:
      - "Sources List becomes a dense Source operations table with Knowledge Base ownership, source type, ingestion mode, connection status, sync status, last processing time, and evidence counts."
      - "Source Detail becomes a tabbed operator console for overview, ingestion configuration, Raw Material, Parsed Document, WikiNode Suggestions, and processing records."
      - "Ingestion Configuration exposes local configuration metadata and safe actions only."
      - "Processing Records use Source Operation evidence and link to Raw Material, Parsed Document, and Draft WikiNode Suggestion records."
      - "Knowledge Base Detail Source tab keeps ownership context and links to Source Detail and Import File."
      - "No real external connector, OAuth, external API/database/web crawler execution, external scheduling, embedding, external vector sync, approval workflow, RBAC, batch operation, export, Agent, Chatbot, Workflow, Vector DB Management, product-facing Chunk Management, package change, or lockfile change is added."
