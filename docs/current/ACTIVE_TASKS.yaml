      - "src/**"
      - "pom.xml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "src/main/resources/db/migration/**"
    gates:
      - "Source analysis gate: clone or read Tencent/WeKnora outside this repository as read-only evidence."
      - "Report gate: every conclusion must cite concrete WeKnora paths, APIs, or data structures when found."
      - "Scope gate: ignore Agent, Chatbot, Workflow, MCP, IM, and LLM answer-generation modules except direct graph/search coupling notes."
      - "Harness gate: run bash scripts/check.sh after report and state updates."
    stop_conditions:
      - "Any WikiNode Studio source-code modification."
      - "Any dependency, package, or lockfile change."
      - "Any product implementation beyond the analysis document."
      - "Unable to access Tencent/WeKnora source."
