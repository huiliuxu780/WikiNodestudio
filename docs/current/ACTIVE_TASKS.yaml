    title: "Quality Issue Console Baseline"
    status: ready
    story_ids: [US054]
    allowed_files:
      - "src/pages/**"
      - "src/components/quality/**"
      - "src/utils/display-labels.ts"
      - "tests/e2e/**"
      - "docs/current/**"
      - "docs/registry/**"
      - "docs/release/**"
    forbidden_files:
