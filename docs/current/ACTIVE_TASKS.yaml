      - "pnpm-lock.yaml"
      - ".github/workflows/**"
      - "src/main/java/**"
      - "src/main/resources/db/migration/**"
    gates:
      - "TDD gate: write or update Playwright coverage for the Quality Issues page before implementation."
      - "Product gate: keep quality issues WikiNode-centered and show WikiLink, source evidence, Index Segment, and retrieval signals only as issue evidence."
      - "Boundary gate: no automated quality check runner, repair action, batch operation, export, embedding, external vector-store work, Source import, parser execution, permissions, publishing, or new dependencies."
      - "Verification gate: pnpm lint, pnpm build, bash scripts/check.sh, focused Playwright, and diff check."
    stop_conditions:
      - "Backend API changes, DB migration, automated quality check execution, repair action, batch operation, export, external vector DB integration, embedding invocation, permissions, publishing approval, package or lockfile change."
