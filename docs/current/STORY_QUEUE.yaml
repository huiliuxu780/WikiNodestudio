stories:
  - id: US072
    title: "Publishing and Index Lifecycle Local Execution"
    status: in_progress
    priority: high
    summary: "Make WikiNode publish and reindex actions execute against local backend state, preparing Index Segments while keeping embedding and external vector sync out of scope."
    acceptance:
      - "POST /api/wiki-nodes/{nodeId}/publish updates an eligible WikiNode to published/outdated and prepares local Index Segments."
      - "POST /api/wiki-nodes/{nodeId}/reindex regenerates local Index Segments and keeps external vector sync pending."
      - "WikiNode editor publish and reindex buttons use the backend lifecycle APIs instead of local mock state."
      - "The flow does not invoke embedding, write vector documents, sync external vector stores, add approval/RBAC, batch/export, Agent, Chatbot, Workflow, or product-facing Chunk Management."
