stories:
  - id: US055
    title: "Quality governance surfaces baseline"
    status: ready
    goal: "Turn the remaining Quality / Evaluation skeleton pages into PM-readable governance surfaces for conflict detection, expired knowledge, and duplicate knowledge while staying aligned with the Quality Issues evidence console."
    acceptance:
      - "Conflicts page explains policy, time, scope, and coverage-conflict evidence with affected WikiNodes and suggested review owner."
      - "Expired Knowledge page explains expired, expiring, and no-expiry-date WikiNode risks with lifecycle and indexing implications."
      - "Duplicates page explains duplicate-title and duplicate-content candidates with affected WikiNodes and evidence summaries."
      - "The three pages use product-facing governance language and do not leak PR boundary, mock, DTO, repository, or implementation terms."
      - "Quality Issues, Conflicts, Expired Knowledge, and Duplicates read as one coherent quality-governance area."
      - "Visible copy avoids Chat API, Chatbot, Agent Platform, Workflow Builder, Vector DB Management, and Chunk Management."
    non_goals:
      - "No backend API, DB migration, automated conflict detection, automated expiration job, duplicate-matching algorithm, resolved or ignore write action, batch operation, export, publishing approval, external vector DB work, embedding, Source import, parser execution, permissions, package change, or dependency change."
