stories:
  - id: US062
    title: "Broken Link governance evidence actions"
    status: in_progress
    goal: "Turn Broken Links into a clearer governance evidence surface with source context, target evidence, relation status, and safe navigation."
    acceptance:
      - "Broken Links shows source WikiNode, anchor text, target identifier, resolved target, relation type, relation source, and relation status."
      - "Each broken relation provides safe navigation to the source WikiNode."
      - "The page does not expose unimplemented repair, ignore, batch, or create-target write actions."
      - "Playwright covers the governance evidence fields and safe navigation boundary."
    non_goals:
      - "No batch repair, automatic repair, Source import, parser execution, AI suggestion, permission flow, approval workflow, backend API, database migration, package change, or dependency change."
