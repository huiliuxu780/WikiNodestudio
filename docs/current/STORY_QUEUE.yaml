stories:
  - id: US061
    title: "WikiGraph relation filter and legend completion"
    status: in_progress
    goal: "Complete WikiGraph relation filtering, legend, edge visual semantics, and edge detail inspection while preserving the existing React Flow graph."
    acceptance:
      - "WikiGraph toolbar supports relation type filters for all, references, related, applies, replaces, conflicts, derived/source, and broken relations."
      - "WikiGraph toolbar supports relation status filters for all, active, broken, pending review, and rejected relations."
      - "Conflict and broken relations have visually distinct edge treatments."
      - "Graph legend explains normal, conflict, and broken relation edges."
      - "Clicking an edge opens relation detail in the Inspector."
      - "Playwright covers relation filters, legend, and edge detail."
    non_goals:
      - "No graph database, backend graph rewrite, new graph layout algorithm, new dependency, backend API, database migration, package change, retrieval behavior, approval workflow, or repair action."
