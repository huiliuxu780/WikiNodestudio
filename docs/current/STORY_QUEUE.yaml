stories:
  - id: US081
    title: "Source Connector Credential UX and Connection Readiness"
    status: in_progress
    priority: high
    summary: "Extend the Source connector console with credential readiness and connection-check evidence so operators can understand whether a Source is missing, configured, expired, revoked, or not required without exposing or storing real secrets."
    acceptance:
      - "Sources List shows credential status and last credential check alongside Knowledge Base ownership, ingestion mode, connection status, sync status, and evidence counts."
      - "Source Detail summary shows credential readiness without exposing token, password, app secret, private key, cookie, or raw auth header values."
      - "Source Detail Ingestion Configuration tab separates Connector Profile from Credential and Connection Readiness."
      - "Knowledge Base Detail Source tab shows credential readiness in the Source ownership table."
      - "Processing Records can show connection-check evidence using Source Operation rows."
      - "The UI does not present real OAuth, real Feishu/API/database/web crawler execution, secret storage, external scheduling, embedding, external vector sync, approval workflow, RBAC, batch operations, export, Agent, Chatbot, Workflow, Vector DB Management, or product-facing Chunk Management."
