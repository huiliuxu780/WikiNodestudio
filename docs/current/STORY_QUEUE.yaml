stories:
  - id: US056
    title: "Knowledge relation management read surface"
    status: in_progress
    goal: "Make Knowledge Relation a first-class read-only WikiNode surface using the current frontend, API, and data contracts."
    acceptance:
      - "Adds `docs/current/KNOWLEDGE_RELATION_MANAGEMENT_PRD.md` as the current relation-management planning and execution baseline."
      - "Audits existing WikiLink, KnowledgeRelation, wiki_node_relations, WikiGraph, Broken Links, and WikiNode detail/editor relation surfaces."
      - "Defines accepted product direction for Markdown WikiLink plus first-class Knowledge Relation and implements the current read-only frontend surface."
      - "Defines relation type/status/source direction and maps the external PRD enum style to the current lowercase contract direction."
      - "WikiNode Inspector includes a dedicated relation surface with structured relations, Markdown WikiLinks, unresolved relation counts, relation status/source, target object, and evidence."
      - "Broken Links displays unresolved relation context without fake create, associate, ignore, repair, or batch actions."
      - "No backend, database, API, Java model, package, lockfile, or CI files are changed."
    non_goals:
      - "No relation CRUD, relation drawer, manual add/edit/delete action, backend API, DB migration, Java model change, frontend implementation, graph algorithm, Broken Link repair action, Source import, parser execution, vector retrieval change, AI relation suggestion, permission flow, package change, or dependency change."
