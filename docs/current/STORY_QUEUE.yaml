stories:
  - id: US077
    title: "Imported Knowledge Acceptance to WikiNode Retrieval Loop"
    status: in_progress
    priority: high
    summary: "Close the post-import acceptance loop so an imported Parsed Document can be reviewed as a Draft WikiNode Suggestion, accepted into a WikiNode, prepared as Index Segment evidence, verified in WikiGraph, and retrieved through Retrieval Test under the same Knowledge Base scope."
    acceptance:
      - "The import success path exposes a primary action to review the generated Draft WikiNode Suggestion."
      - "A Draft WikiNode Suggestion detail page lets an operator inspect suggested WikiNode content, sourceRefs, metadata, relations, Parsed Document evidence, and Knowledge Base ownership before accepting or rejecting."
      - "Accepting a suggestion creates or updates a WikiNode with knowledgeBaseId, sourceId, rawMaterialId, parsedDocumentId, sourceRefs, objectType, subtype, metadata, and relations preserved."
      - "The accepted WikiNode prepares local Index Segment evidence without embedding or external vector sync."
      - "WikiGraph can show the accepted WikiNode and imported relations under the same Knowledge Base scope."
      - "Retrieval Test can query the same Knowledge Base scope and return the accepted WikiNode as a WikiNode-centered result."
      - "The flow does not implement real Feishu/API/web/database connectors, embedding, external vector sync, approval workflow, RBAC, batch operations, export, Agent, Chatbot, Workflow, Vector DB Management, or product-facing Chunk Management."
