stories:
  - id: US054
    title: "Quality issue console baseline"
    status: ready
    goal: "Turn the existing Quality / Evaluation roadmap into a PM-readable quality issue console baseline that explains WikiNode, WikiLink, source evidence, Index Segment, and retrieval-quality risks without running automated quality checks."
    acceptance:
      - "Quality Issues page groups PM-readable issue evidence by missing metadata/source evidence, broken WikiLinks, stale or risky Index Segments, duplicate/expired knowledge, and retrieval-quality risks."
      - "Each issue row or card identifies the affected WikiNode or Knowledge Object, severity, issue type, evidence summary, and safe next action."
      - "Quality issue copy stays read-only and does not imply automated repair, batch processing, publishing approval, vector sync, parser execution, or permissions enforcement."
      - "Existing Broken Links, Index Segment, Retrieval Evaluation, and WikiNode-centered terminology remain consistent."
      - "Visible copy avoids Chat API, Chatbot, Agent Platform, Workflow Builder, Vector DB Management, and Chunk Management."
    non_goals:
      - "No backend API, DB migration, quality check runner, automated repair, batch operation, export, publishing approval, external vector DB work, embedding, Source import, parser execution, permissions, package change, or dependency change."
