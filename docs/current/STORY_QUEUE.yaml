stories:
  - id: US055
    title: "Frontend IA and boundary-copy correction"
    status: in_progress
    goal: "Correct the current frontend information architecture and visible copy so roadmap-only quality capabilities are not exposed as hidden pages, and product pages do not display implementation boundary explanations as content."
    acceptance:
      - "Routes without product navigation ownership for Conflicts, Expired Knowledge, and Duplicates are removed from the executable frontend router and route smoke coverage."
      - "Raw Materials, Sources, Draft WikiNode Suggestion, Publishing, Parser, Settings, and related skeleton pages use business object, state, evidence, and review language instead of visible execution-boundary explanations."
      - "Quality Issues remains the current governance entry point in the sidebar; future conflict, expiration, and duplicate capabilities stay in roadmap docs until explicitly scoped."
      - "Playwright checks include negative coverage for visible boundary copy such as execution boundary, current read-only, not provided, not executed, mock, DTO, and repository terms."
      - "Visible copy avoids Chat API, Chatbot, Agent Platform, Workflow Builder, Vector DB Management, and Chunk Management."
    non_goals:
      - "No new product page, backend API, DB migration, automated quality execution, duplicate matching, conflict workflow, expiration job, batch operation, export, publishing approval, external vector DB work, embedding, Source import, parser execution, permissions, package change, or dependency change."
