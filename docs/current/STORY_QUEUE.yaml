stories:
  - id: US074
    title: "Manual E2E Acceptance Pack"
    status: in_progress
    priority: high
    summary: "Provide a repeatable local manual acceptance pack for Source import through WikiGraph and Retrieval API so PM testing can validate the full chain without relying on chat notes."
    acceptance:
      - "The pack lists environment preconditions, sample markdown content, browser steps, API guard, pass criteria, fail criteria, and explicit non-goals."
      - "The browser steps cover Source import, Raw Material, Parsed Document, document segments, Draft WikiNode Suggestion, WikiNode publish, WikiGraph, and Retrieval API."
      - "The API guard points to the existing smoke checks that verify the same imported WikiNode reaches WikiGraph and Retrieval API."
      - "The pack remains documentation-only and does not add product UI, backend API, DB migration, dependency, external vector sync, Agent, Chatbot, Workflow, or Vector DB Management scope."
