stories:
  - id: US071
    title: "Draft WikiNode Index Segment Preparation"
    status: in_progress
    priority: high
    summary: "When a Draft WikiNode Suggestion is accepted into a draft WikiNode, prepare local Index Segment evidence for that draft without publishing, indexing, embedding, or vector sync."
    acceptance:
      - "Accepting an eligible Draft WikiNode Suggestion creates one draft WikiNode and prepares local Index Segments for it."
      - "The accept response returns the draft WikiNode id and prepared Index Segment count without exposing segment ids as the primary result."
      - "Prepared Index Segments remain not_indexed and can be read through existing WikiNode Index Segment APIs."
      - "The flow does not publish, index, embed, sync vector stores, create WikiLinks, connect external sources, or expose product-facing Chunk Management."
