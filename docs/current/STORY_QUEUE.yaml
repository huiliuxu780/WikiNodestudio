stories:
  - id: US057
    title: "Knowledge relation management mutation baseline"
    status: in_progress
    goal: "Make one Knowledge Relation editable from a WikiNode while preserving the current WikiNode-centered model and relation read surface."
    acceptance:
      - "Adds backend, repository, migration, and API support for single Knowledge Relation create, update, delete, and list operations scoped to one WikiNode."
      - "WikiNode Inspector supports adding, editing, and deleting one structured Knowledge Relation with target WikiNode, relation type, manual source, status, note, and evidence link."
      - "The existing Markdown WikiLink and Broken Link read surfaces remain separate from the structured Knowledge Relation mutation path."
      - "Repository, API contract, frontend build, and Playwright coverage validate the single-relation mutation path."
      - "No batch relation operations, approval workflow, AI suggestion, Source import, parser execution, vector sync, permissions, package change, or dependency change."
    non_goals:
      - "No batch create/update/delete, relation approval workflow, relation suggestion, automatic conflict resolution, graph algorithm, Broken Link repair action, Source import, parser execution, vector retrieval change, AI relation suggestion, permission flow, package change, or dependency change."
