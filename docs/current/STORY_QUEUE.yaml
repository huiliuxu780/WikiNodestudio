stories:
  - id: US070
    title: "Source Import to Draft WikiNode Suggestion Flow"
    status: in_progress
    priority: high
    summary: "Connect local Source file import to Draft WikiNode Suggestion generation so an uploaded document reaches the review queue in one local flow."
    acceptance:
      - "A Source detail page can import a local txt/md/docx file and generate a Draft WikiNode Suggestion."
      - "The import response returns Raw Material, Parsed Document, document segment, and suggestion identifiers."
      - "The generated suggestion can be opened from the import result."
      - "Source Operation records import, parse, and suggestion generation actions."
      - "The flow does not create published WikiNodes, publish, index, embed, sync vector stores, connect external sources, or expose product-facing Chunk Management."
