version: 2
updated_at: "2026-06-26"
source_of_truth: "current_story_queue"
notes:
  - "Only ready, in_progress, and blocked stories belong here."
  - "Done history stays in release docs or archive."
  - "Each story is a product capability slice, not a tiny UI patch."
stories:
  - id: US048
    title: "WikiNode Knowledge Object API alignment"
    status: ready
    goal: "Align WikiNode Knowledge Object fields across Java, DB, API, frontend service, editor, and tests while preserving WikiNode as the managed business object."
    acceptance:
      - "WikiNode API exposes objectType, subtype, metadata, sourceRefs, relations, and processingProfile where the current product model requires them."
      - "WikiNode detail/editor read the aligned API instead of relying only on frontend mock data for these fields."
      - "Existing Chinese UX, sidebar shell, and Inspector tabs remain stable."
      - "Retrieval results remain WikiNode-centered and do not expose raw chunks."
    non_goals:
      - "No Source import, parser execution, publishing approval, embedding, vector sync, permissions, or batch operations."
      - "No new dependency or package/lockfile change."
  - id: US049
    title: "Index Segment generation and trace model"
    status: ready
    goal: "Turn Index Segment from a read-only stored sample into a controlled local generation and trace model tied to WikiNode content and source evidence."
    acceptance:
      - "Index Segment generation is deterministic, local, and preserves nodeId, segmentType, contentPreview, metadata, sourceRefs, and trace evidence."
      - "Segment list, debug panel, and WikiNode Segments tab can show generated segment evidence from the backend model."
      - "Generation remains pre-vector-store and does not call embedding or external vector services."
    non_goals:
      - "No external vector-store sync, embedding invocation, real publish workflow, approval flow, or Chunk Management naming."
  - id: US050
    title: "Retrieval API debug evidence and query logs"
    status: ready
    goal: "Align Retrieval API and Retrieval Test so normal mode returns WikiNodes and debug mode shows matched Index Segment evidence plus persisted query log basics."
    acceptance:
      - "Normal retrieval remains WikiNode-first."
      - "Debug retrieval can expose matchedSegments and trace evidence without making segments the primary result."
      - "Query logs capture query, filters, returned WikiNodes, matched segments, latency, status, and error summary at a minimum."
      - "Retrieval Test uses the aligned API and keeps product copy clear."
    non_goals:
      - "No Chat API, Chatbot, answer generation, raw chunk response, external vector DB implementation, or evaluation runner."
  - id: US051
    title: "Publishing and index job boundary"
    status: ready
    goal: "Define a read-only publishing/index job boundary that shows readiness, validation, segment generation status, and external vector-sync boundary without executing production publishing."
    acceptance:
      - "Publishing and index pages distinguish readiness checks, Index Segment generation state, and external vector sync boundary."
      - "Job/status model is verifiable without invoking external vector stores."
      - "Index Status and related pages can explain failed/outdated/not_indexed cases clearly."
    non_goals:
      - "No approval workflow, batch publish, rollback, external vector sync, embedding, or destructive operation."
  - id: US052
    title: "Quality and evaluation console"
    status: ready
    goal: "Create a verifiable quality/evaluation console based on WikiNode, WikiLink, Index Segment, and Retrieval evidence."
    acceptance:
      - "Quality issues can represent missing summary, missing sourceRefs, broken links, stale Index Segments, and metadata gaps."
      - "Evaluation cases can store test query, expected WikiNodes, and run result evidence."
      - "Console stays read-only or minimally interactive until scoring rules are explicitly approved."
    non_goals:
      - "No complex scoring engine, export, batch operations, or production quality automation."
  - id: US053
    title: "Tags and metadata governance"
    status: ready
    goal: "Add governance surfaces for tags, metadata fields, objectType/subtype display rules, and filter participation after core Knowledge Object alignment."
    acceptance:
      - "Tags and metadata field pages show schema intent, display labels, validation rules, and retrieval/index participation."
      - "Changes stay aligned with Knowledge Object model and do not create a separate object system."
    non_goals:
      - "No permission boundary, approval workflow, or broad schema designer beyond confirmed metadata governance."
  - id: US054
    title: "Admin roles permissions audit planning"
    status: ready
    goal: "Plan users, roles, permissions, and audit logs as a bounded governance capability without enforcing authentication or authorization."
    acceptance:
      - "Roles, permissions, and audit surfaces define intended dimensions and evidence requirements."
      - "Any implementation remains read-only/planning unless auth enforcement is separately confirmed."
    non_goals:
      - "No auth enforcement, login flow, permission checks, destructive admin actions, export, or batch operation."
