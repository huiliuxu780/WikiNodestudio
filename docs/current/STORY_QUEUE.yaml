stories:
  - id: US075
    title: "Knowledge Base Administration"
    status: in_progress
    priority: high
    summary: "Implement Knowledge Base as the management container around WikiNodes and Sources, with backend persistence, lifecycle APIs, frontend administration pages, and minimal Retrieval API scope."
    acceptance:
      - "Knowledge Base has persisted backend model, seeded baseline records, CRUD APIs, and disable/archive/restore lifecycle APIs."
      - "WikiNode and Source records expose knowledgeBaseId so Knowledge Base can act as the scope container."
      - "Retrieval API accepts a Knowledge Base filter while continuing to return WikiNode results by default."
      - "The frontend /knowledge-bases list, detail, and settings pages use API-backed dense management surfaces."
      - "The flow does not implement full RBAC, permission enforcement, approval workflow, copy/move/delete, external sync, embedding, vector store sync, Agent, Chatbot, Workflow, Vector DB Management, or product-facing Chunk Management."
