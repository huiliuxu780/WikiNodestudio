stories:
  - id: US073
    title: "Source to Graph Retrieval Acceptance Chain"
    status: in_progress
    priority: high
    summary: "Lock the local end-to-end acceptance chain from Source import and document segment persistence through Draft WikiNode Suggestion, local publish preparation, WikiGraph visibility, and Retrieval API WikiNode results."
    acceptance:
      - "A local imported markdown file creates Raw Material, Parsed Document, and document segment evidence."
      - "The generated Draft WikiNode Suggestion can be accepted into a WikiNode and locally published with prepared Index Segments."
      - "The accepted imported WikiNode appears in WikiGraph overview with a resolved WikiLink edge from imported content."
      - "Retrieval API returns the accepted imported WikiNode as a WikiNode result and exposes matched Index Segment evidence only in debug mode."
      - "The flow does not invoke embedding, write vector documents, sync external vector stores, add approval/RBAC, batch/export, Agent, Chatbot, Workflow, or product-facing Chunk Management."
