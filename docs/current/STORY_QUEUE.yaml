stories:
  - id: US060
    title: "Markdown WikiLink relation mapping hardening"
    status: in_progress
    goal: "Make Markdown-derived WikiLinks consistently visible as relationship evidence after edit/save while preserving existing WikiLink syntax."
    acceptance:
      - "Existing `[[target]]` and `[[target|anchor]]` Markdown WikiLink syntax remains compatible."
      - "Inspector relation evidence shows Markdown anchor text, target identifier, resolved target, relation source, and relation status."
      - "Resolved Markdown WikiLinks and unresolved WikiLinks are displayed consistently in the relation tab after a WikiNode save."
      - "Manual structured relations are not forced back into Markdown."
      - "Playwright covers resolved and unresolved Markdown WikiLink evidence after save."
    non_goals:
      - "No forced write-back from manual Knowledge Relations to Markdown."
      - "No relation governance workflow, review lifecycle, repair action, graph filter, retrieval behavior, backend API, database migration, package change, or dependency change."
