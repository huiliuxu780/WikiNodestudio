stories:
  - id: US059
    title: "Knowledge relation editor experience completion"
    status: in_progress
    goal: "Complete the WikiNode Inspector relation editor experience while keeping Knowledge Relation management WikiNode-only and within the existing mutation baseline."
    acceptance:
      - "Relation add/edit uses a compact drawer or side panel instead of an inline form."
      - "The drawer supports target WikiNode search, relation type selection, relation status selection, and relation note entry."
      - "Target object type is visible with WikiNode as the enabled target type."
      - "Structured relation cards are grouped by semantic section such as applicability, reference, replacement, risk, source evidence, and broken or pending context."
      - "Create, update, and delete actions keep Chinese feedback visible."
      - "Playwright covers add, edit, delete, status selection, target search, and grouped relation display."
    non_goals:
      - "No Source, Document, Product, or non-WikiNode target mutation."
      - "No approval, confirm, reject, review lifecycle, batch operation, repair, AI suggestion, permissions, retrieval behavior, graph filter, backend API, database migration, package change, or dependency change."
