stories:
  - id: US069
    title: "Source Import and Document Segment Persistence"
    status: in_progress
    priority: high
    summary: "Add the local file-entry foundation that turns txt/md/docx uploads into Raw Material, Parsed Document, and persisted document segments."
    acceptance:
      - "A Source detail page can upload a local txt/md/docx file."
      - "The backend creates Raw Material and Parsed Document records for the uploaded file."
      - "The backend persists document segments for the Parsed Document."
      - "Parsed Result preview can show the generated document segments."
      - "Source Operation records file import and parse actions."
      - "The flow does not create WikiNodes, publish, index, embed, sync vector stores, connect external sources, or expose product-facing Chunk Management."
