stories:
  - id: US063
    title: "Relation review and governance"
    status: in_progress
    goal: "Add lightweight relation review controls for pending and conflict Knowledge Relations using the existing relation update contract."
    acceptance:
      - "Pending or conflict Knowledge Relations expose confirm and reject review actions in the WikiNode Inspector."
      - "Review actions preserve relation target and type while updating relation status to active or rejected."
      - "Review note is captured in the existing relation note field."
      - "Conflict relations remain visually emphasized as risk relations."
      - "Playwright covers pending conflict review and rejected-state display."
    non_goals:
      - "No full permission model, approval workflow, audit persistence, backend API, database migration, package change, dependency change, batch operation, repair action, AI suggestion, retrieval behavior, parser execution, vector sync, or Source import."
