stories:
  - id: US080
    title: "External Source Connector Configuration Baseline"
    status: in_progress
    priority: high
    summary: "Turn Source management into a credible local connector-configuration and evidence console so operators can see Source ownership, ingestion mode, connection status, sync status, processing records, and the Source-to-WikiNode evidence chain without executing real external connectors."
    acceptance:
      - "Sources List shows Source type, Knowledge Base ownership, ingestion mode, connection status, sync status, last processing time, and evidence counts in a dense table."
      - "Source Detail uses a compact operator-console layout with tabs for overview, ingestion configuration, Raw Material, Parsed Document, WikiNode Suggestions, and processing records."
      - "Ingestion Configuration exposes local metadata only: source type, ingestion mode, connection status, sync policy, parser profile, owner, last check time, and failure reason."
      - "Processing Records show Source Operation evidence linked to Raw Material, Parsed Document, and Draft WikiNode Suggestion records."
      - "Knowledge Base Detail Source tab links into Source Detail and Import File without hiding ownership context."
      - "The UI does not present real OAuth, real Feishu/API/database/web crawler execution, external scheduling, embedding, external vector sync, approval workflow, RBAC, batch operations, export, Agent, Chatbot, Workflow, Vector DB Management, or product-facing Chunk Management."
